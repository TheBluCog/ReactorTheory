<!DOCTYPE html>
<html>
<head>
  <title>ARTYMUS Verifier</title>
  <style>
    body { font-family: monospace; background:#111; color:#0f0; padding:20px }
    textarea { width:100%; height:200px }
    button { padding:10px; margin-top:10px }
    .result { margin-top:20px }
  </style>
</head>
<body>
  <h2>ARTYMUS Receipt Verifier</h2>
  <textarea id="input"></textarea><br>
  <button onclick="verify()">VERIFY</button>
  <div class="result" id="result"></div>

<script>
async function verify() {
  const receipt = JSON.parse(document.getElementById('input').value);
  const res = document.getElementById('result');

  if (!receipt.digest) {
    res.innerText = 'INVALID: No digest';
    return;
  }

  res.innerText = 'Digest present. Verify on-chain via contract.';
}
</script>
</body>
</html>
