<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZTB WORM Dashboard</title>
<style>
body { background:#000; color:#0f0; font-family:monospace; }
.flash { font-size:24px; margin:10px 0; }
.pass { color:#00ff99; }
.soft { color:#ffaa00; }
.block { color:#ff0033; }
</style>
</head>
<body>
<h1>⚡ ZTB WORM Telemetry</h1>
<div id="stream"></div>

<script>
async function fetchEvents() {
  const res = await fetch('/api/ztb/audit-stream');
  return res.json();
}

function render(events) {
  const container = document.getElementById('stream');
  container.innerHTML = '';

  events.forEach(e => {
    const div = document.createElement('div');
    div.className = 'flash ' + (
      e.type === 'PASS' ? 'pass' :
      e.type === 'SOFT_FRICTION' ? 'soft' : 'block'
    );

    div.textContent = `${e.type} :: ${e.ts}`;
    container.appendChild(div);
  });
}

setInterval(async () => {
  const events = await fetchEvents();
  render(events);
}, 1000);
</script>
</body>
</html>
