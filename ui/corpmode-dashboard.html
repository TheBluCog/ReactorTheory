<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RT9.1 Governance Dashboard (CORPMODE)</title>
<style>
body { font-family:Segoe UI,Arial; background:#f4f6f9; color:#111; margin:0; }
header { background:#0a0f1f; color:#fff; padding:20px; }
h1 { margin:0; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; padding:20px; }
.card { background:#fff; padding:16px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,.1); }
.pass { border-left:4px solid #0a8f4a; }
.soft { border-left:4px solid #c98a00; }
.block { border-left:4px solid #b00020; }
.table { width:100%; border-collapse:collapse; }
th,td { padding:8px; border-bottom:1px solid #ddd; font-size:12px; }
</style>
</head>
<body>
<header>
<h1>RT9.1 Governance Dashboard</h1>
<p>Resonance Engine · Enterprise Observability Layer</p>
</header>

<section class="grid">
<div class="card pass"><b>PASS</b><div id="cPass">0</div></div>
<div class="card soft"><b>SOFT_FRICTION</b><div id="cSoft">0</div></div>
<div class="card block"><b>HARD_BLOCK</b><div id="cBlock">0</div></div>
<div class="card"><b>Latest Hash</b><div id="cHash">—</div></div>
</section>

<section class="card" style="margin:20px;">
<h2>Event Log</h2>
<table class="table" id="cTable"></table>
</section>

<script>
async function poll(){
  const r = await fetch('/api/ztb/audit-stream');
  const events = await r.json();

  let pass=0,soft=0,block=0;
  events.forEach(e=>{ if(e.type==='PASS') pass++; if(e.type==='SOFT_FRICTION') soft++; if(e.type==='HARD_BLOCK') block++; });

  document.getElementById('cPass').textContent = pass;
  document.getElementById('cSoft').textContent = soft;
  document.getElementById('cBlock').textContent = block;
  document.getElementById('cHash').textContent = events[0]?.entry_hash?.slice(0,12)||'—';

  document.getElementById('cTable').innerHTML = '<tr><th>Type</th><th>Time</th><th>CID</th></tr>' + events.map(e=>`<tr><td>${e.type}</td><td>${new Date(e.ts).toLocaleTimeString()}</td><td>${e.cid_hash}</td></tr>`).join('');
}
setInterval(poll,1000);
poll();
</script>
</body>
</html>
