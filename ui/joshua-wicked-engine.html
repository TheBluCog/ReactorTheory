<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOSHUA · Wicked Engine</title>
  <link rel="stylesheet" href="./joshua-wicked-engine.css" />
</head>
<body>
  <div class="screen-noise"></div>
  <main class="wicked-shell">
    <header class="wicked-header">
      <div>
        <p class="kicker">J.O.S.H.U.A. · WICKED ENGINE</p>
        <h1>GOVERNANCE WAR ROOM</h1>
        <p class="subline">RT9.1 telemetry · WORM chain · ZTB-NATOHEX boundary</p>
      </div>
      <div class="voice-controls">
        <button id="voiceToggle" class="voice-toggle">VOICE: OFF</button>
        <div class="threat-core" id="threatCore"><span>ONLINE</span></div>
      </div>
    </header>

    <section class="wicked-grid">
      <article class="wicked-card pass"><span>PASS</span><strong id="jPass">0</strong></article>
      <article class="wicked-card soft"><span>SOFT FRICTION</span><strong id="jSoft">0</strong></article>
      <article class="wicked-card block"><span>HARD BLOCK</span><strong id="jBlock">0</strong></article>
    </section>

    <section class="war-layout">
      <article class="terminal-panel">
        <h2>EXECUTION FLASH STREAM</h2>
        <div id="jStream" class="j-stream"></div>
      </article>
      <article class="terminal-panel side">
        <h2>JOSHUA ANALYSIS</h2>
        <div id="jThreats" class="j-threats"></div>
      </article>
    </section>

    <section class="terminal-panel command">
      <h2>WICKED ENGINE CONSOLE</h2>
      <pre id="jConsole">JOSHUA INITIALIZING...</pre>
    </section>
  </main>

<script>
const jStream = document.getElementById('jStream');
const jThreats = document.getElementById('jThreats');
const jConsole = document.getElementById('jConsole');
const jPass = document.getElementById('jPass');
const jSoft = document.getElementById('jSoft');
const jBlock = document.getElementById('jBlock');
const core = document.getElementById('threatCore');
const voiceToggle = document.getElementById('voiceToggle');
let voiceEnabled = false;
let audioCtx = null;
let lastEventId = null;

function styleOf(type){ return type === 'PASS' ? 'pass' : type === 'SOFT_FRICTION' ? 'soft' : 'block'; }

function initAudio(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function tone(type){
  if (!voiceEnabled) return;
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const freq = type === 'PASS' ? 440 : type === 'SOFT_FRICTION' ? 220 : 110;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  osc.type = type === 'HARD_BLOCK' ? 'sawtooth' : 'sine';
  gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.12, audioCtx.currentTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.35);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.38);
}

function speak(type, findings=[]){
  if (!voiceEnabled || !window.speechSynthesis) return;
  const top = findings[0]?.class || 'NO ACTIVE DRIFT';
  const lines = {
    PASS: 'Joshua confirms pass. Boundary coherent.',
    SOFT_FRICTION: `Soft friction detected. Drift class ${top}. Execution allowed under observation.`,
    HARD_BLOCK: `Hard block. Threat class ${top}. Execution denied.`
  };
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(lines[type] || 'Telemetry event received.');
  utterance.rate = 0.86;
  utterance.pitch = 0.72;
  utterance.volume = 0.92;
  window.speechSynthesis.speak(utterance);
}

voiceToggle.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  voiceToggle.textContent = voiceEnabled ? 'VOICE: ON' : 'VOICE: OFF';
  if (voiceEnabled) {
    initAudio();
    speak('PASS', []);
  }
});

function render(events){
  let pass=0, soft=0, block=0;
  events.forEach(e => { if(e.type==='PASS') pass++; if(e.type==='SOFT_FRICTION') soft++; if(e.type==='HARD_BLOCK') block++; });
  jPass.textContent = pass; jSoft.textContent = soft; jBlock.textContent = block;
  const latest = events[0];
  core.className = 'threat-core ' + (latest ? styleOf(latest.type) : '');

  if (latest && latest.id !== lastEventId) {
    lastEventId = latest.id;
    tone(latest.type);
    speak(latest.type, latest.metadata || []);
  }

  jStream.innerHTML = events.map(e => `<div class="flash ${styleOf(e.type)}"><b>${e.type}</b><span>${new Date(e.ts).toLocaleTimeString()}</span><small>${e.entry_hash?.slice(0,18) || 'NOHASH'}</small></div>`).join('');

  const threats = events.flatMap(e => (e.metadata || []).map(m => ({...m, parent:e.type})));
  jThreats.innerHTML = threats.length ? threats.slice(0,10).map(t => `<div class="threat ${t.severity === 'HARD' ? 'block' : 'soft'}"><b>${t.class}</b><span>${t.severity}</span><small>${t.detail || 'drift vector classified'}</small></div>`).join('') : '<div class="quiet">NO ACTIVE DRIFT. SYSTEM COHERENCE NOMINAL.</div>';

  jConsole.textContent = [
    'JOSHUA: WICKED ENGINE ONLINE',
    'VOICE_LAYER: ' + (voiceEnabled ? 'ARMED' : 'STANDBY'),
    'MODE: CINEMATIC GOVERNANCE / DEMO WAR ROOM',
    'BOUNDARY: ZTB-NATOHEX-1.0',
    `LAST_DECISION: ${latest?.type || 'NONE'}`,
    `LATEST_WORM_HASH: ${latest?.entry_hash || 'NONE'}`,
    `PREVIOUS_CHAIN_HASH: ${latest?.prev_hash || 'GENESIS'}`,
    `EVENT_BUFFER: ${events.length}`,
    'COMMAND: GOVERN();'
  ].join('\n');
}

async function poll(){
  try { const r = await fetch('/api/ztb/audit-stream'); render(await r.json()); }
  catch { jConsole.textContent = 'JOSHUA: AUDIT STREAM UNAVAILABLE'; }
}
poll(); setInterval(poll, 1000);
</script>
</body>
</html>
